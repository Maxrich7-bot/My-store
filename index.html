<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MR Kicks & Fits</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    header {
      background: black;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      font-size: 14px;
      color: #ccc;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .product {
      background: white;
      border-radius: 10px;
      padding: 15px;
      margin: 10px;
      display: inline-block;
      width: 220px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .product h3 {
      margin: 10px 0 5px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      background: black;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    footer {
      margin-top: 30px;
      padding: 15px;
      background: black;
      color: white;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>

  <p>🔥 Shoes & Streetwear Deals 🔥</p>
</header>

<div class="container">

    <img src="https://via.placeholder.com/200" alt="Shoes">

  <div class="product">
    <img src="https://via.placeholder.com/200" alt="Sneakers">

    <p class="price">$140</p>
    <button onclick="contact()">Buy Now</button>

</div>

<footer>
  DM to purchase | Fast replies ⚡

</html>
